# =============================================================================
# IA Aggregator - Application Configuration
# =============================================================================

spring:
  application:
    name: ia-aggregator

  # --- PostgreSQL ---
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ia_aggregator}?stringtype=unspecified
    username: ${DB_USERNAME:ia_aggregator}
    password: ${DB_PASSWORD:ia_aggregator}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000
      pool-name: IAggregatorPool

  # --- JPA ---
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: auth
        jdbc:
          time_zone: UTC
        format_sql: true

  # --- Flyway ---
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: auth,billing,chat,ai_gateway,partners,content,teams,analytics,audit
    default-schema: auth
    table: flyway_schema_history

  # --- Redis ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          min-idle: 2
          max-active: 10
          max-idle: 8

  # --- Jackson ---
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# --- Server ---
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# --- Application Security ---
app:
  security:
    jwt:
      secret: ${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seS0yNTYtYml0cw==}
      access-token-expiry: 15m
      refresh-token-expiry: 7d
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:3001
      - https://iaggregator.com.br
      - https://www.iaggregator.com.br
  ai:
    guardrails:
      max-prompt-length: ${AI_MAX_PROMPT_LENGTH:5000}
      blocked-patterns: ${AI_BLOCKED_PATTERNS:(?i).*\\b(ignore\\s+previous\\s+instructions|system\\s+override|jailbreak|bypass\\s+policy)\\b.*}
      prompt-action: ${AI_PROMPT_ACTION:block}
      max-output-length: ${AI_MAX_OUTPUT_LENGTH:8000}
      output-blocked-patterns: ${AI_OUTPUT_BLOCKED_PATTERNS:(?i).*\\b(api\\s*key|private\\s*key|token)\\b.*}
      output-action: ${AI_OUTPUT_ACTION:block}
    routing:
      default-model: ${AI_DEFAULT_MODEL:gpt-4o-mini}
      fallback-models: ${AI_FALLBACK_MODELS:claude-3-5-haiku,gemini-1.5-flash}
    providers:
      openai:
        api-key: ${OPENAI_API_KEY:}
        base-url: ${OPENAI_BASE_URL:https://api.openai.com}
        timeout-ms: ${OPENAI_TIMEOUT_MS:15000}
        retry-attempts: ${OPENAI_RETRY_ATTEMPTS:2}
        retry-backoff-ms: ${OPENAI_RETRY_BACKOFF_MS:250}
        supported-models: ${OPENAI_SUPPORTED_MODELS:gpt-4o-mini,gpt-4.1-mini}
      anthropic:
        api-key: ${ANTHROPIC_API_KEY:}
        base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
        timeout-ms: ${ANTHROPIC_TIMEOUT_MS:15000}
        retry-attempts: ${ANTHROPIC_RETRY_ATTEMPTS:2}
        retry-backoff-ms: ${ANTHROPIC_RETRY_BACKOFF_MS:250}
        max-tokens: ${ANTHROPIC_MAX_TOKENS:800}
        supported-models: ${ANTHROPIC_SUPPORTED_MODELS:claude-3-5-haiku}
      gemini:
        api-key: ${GEMINI_API_KEY:}
        base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
        timeout-ms: ${GEMINI_TIMEOUT_MS:15000}
        retry-attempts: ${GEMINI_RETRY_ATTEMPTS:2}
        retry-backoff-ms: ${GEMINI_RETRY_BACKOFF_MS:250}
        supported-models: ${GEMINI_SUPPORTED_MODELS:gemini-1.5-flash}
      openrouter:
        api-key: ${OPENROUTER_API_KEY:}
        base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api}
        timeout-ms: ${OPENROUTER_TIMEOUT_MS:15000}
        retry-attempts: ${OPENROUTER_RETRY_ATTEMPTS:2}
        retry-backoff-ms: ${OPENROUTER_RETRY_BACKOFF_MS:250}
        supported-models: ${OPENROUTER_SUPPORTED_MODELS:openai/gpt-4o-mini,anthropic/claude-3.5-haiku,google/gemini-1.5-flash}
      cohere:
        api-key: ${COHERE_API_KEY:}
        base-url: ${COHERE_BASE_URL:https://api.cohere.com}
        timeout-ms: ${COHERE_TIMEOUT_MS:15000}
        retry-attempts: ${COHERE_RETRY_ATTEMPTS:2}
        retry-backoff-ms: ${COHERE_RETRY_BACKOFF_MS:250}
