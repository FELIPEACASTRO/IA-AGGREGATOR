# =============================================================================
# IA Aggregator - Application Configuration
# =============================================================================

spring:
  application:
    name: ia-aggregator

  # --- PostgreSQL ---
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ia_aggregator}
    username: ${DB_USERNAME:ia_aggregator}
    password: ${DB_PASSWORD:ia_aggregator}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000
      pool-name: IAggregatorPool

  # --- JPA ---
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: auth
        jdbc:
          time_zone: UTC
        format_sql: true

  # --- Flyway ---
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: auth,billing,chat,ai_gateway,partners,content,teams,analytics,audit
    default-schema: auth
    table: flyway_schema_history

  # --- Redis ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          min-idle: 2
          max-active: 10
          max-idle: 8

  # --- Jackson ---
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# --- Server ---
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# --- Application Security ---
app:
  security:
    jwt:
      secret: ${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seS0yNTYtYml0cw==}
      access-token-expiry: 15m
      refresh-token-expiry: 7d
  cors:
    allowed-origins: http://localhost:3000

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# --- Logging ---
logging:
  level:
    root: INFO
    com.ia.aggregator: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# --- SpringDoc OpenAPI ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: IA Aggregator API
    version: 1.0.0
    description: Multi-tenant AI Provider Aggregation Platform

---
# =============================================================================
# Test Profile
# =============================================================================
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:tc:postgresql:16-alpine:///test_db
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  flyway:
    enabled: true

  data:
    redis:
      host: localhost
      port: 6370

logging:
  level:
    com.ia.aggregator: DEBUG
    org.hibernate.SQL: DEBUG
