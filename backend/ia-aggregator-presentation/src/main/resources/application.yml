# =============================================================================
# IA Aggregator - Application Configuration
# =============================================================================

spring:
  application:
    name: ia-aggregator

  # --- PostgreSQL ---
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ia_aggregator}?stringtype=unspecified
    username: ${DB_USERNAME:ia_aggregator}
    password: ${DB_PASSWORD:ia_aggregator}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000
      pool-name: IAggregatorPool

  # --- JPA ---
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: auth
        jdbc:
          time_zone: UTC
        format_sql: true

  # --- Flyway ---
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: auth,billing,chat,ai_gateway,partners,content,teams,analytics,audit
    default-schema: auth
    table: flyway_schema_history

  # --- Redis ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          min-idle: 2
          max-active: 10
          max-idle: 8

  # --- Jackson ---
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# --- Server ---
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# --- Application Security ---
app:
  security:
    jwt:
      secret: ${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seS0yNTYtYml0cw==}
      access-token-expiry: 15m
      refresh-token-expiry: 7d
  cors:
    allowed-origins:
      - http://localhost:3000
      - https://iaggregator.com.br
      - https://www.iaggregator.com.br
  ai:
    routing:
      default-model: ${AI_DEFAULT_MODEL:gpt-4o-mini}
      fallback-models: ${AI_FALLBACK_MODELS:claude-3-5-haiku,gemini-1.5-flash}
    providers:
      openai:
        api-key: ${OPENAI_API_KEY:}
        base-url: ${OPENAI_BASE_URL:https://api.openai.com}
        timeout-ms: ${OPENAI_TIMEOUT_MS:15000}
        retry-attempts: ${OPENAI_RETRY_ATTEMPTS:2}
        retry-backoff-ms: ${OPENAI_RETRY_BACKOFF_MS:250}
        supported-models: ${OPENAI_SUPPORTED_MODELS:gpt-4o-mini,gpt-4.1-mini}
      anthropic:
        api-key: ${ANTHROPIC_API_KEY:}
        base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
        timeout-ms: ${ANTHROPIC_TIMEOUT_MS:15000}
        retry-attempts: ${ANTHROPIC_RETRY_ATTEMPTS:2}
        retry-backoff-ms: ${ANTHROPIC_RETRY_BACKOFF_MS:250}
        max-tokens: ${ANTHROPIC_MAX_TOKENS:800}
        supported-models: ${ANTHROPIC_SUPPORTED_MODELS:claude-3-5-haiku}
      gemini:
        api-key: ${GEMINI_API_KEY:}
        base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
        timeout-ms: ${GEMINI_TIMEOUT_MS:15000}
        retry-attempts: ${GEMINI_RETRY_ATTEMPTS:2}
        retry-backoff-ms: ${GEMINI_RETRY_BACKOFF_MS:250}
        supported-models: ${GEMINI_SUPPORTED_MODELS:gemini-1.5-flash}

resilience4j:
  circuitbreaker:
    instances:
      aiProviderOpenai:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 5
      aiProviderAnthropic:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 5
      aiProviderGemini:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 5

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# --- Logging ---
logging:
  level:
    root: INFO
    com.ia.aggregator: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# --- SpringDoc OpenAPI ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: IA Aggregator API
    version: 1.0.0
    description: Multi-tenant AI Provider Aggregation Platform

---
# =============================================================================
# Test Profile
# =============================================================================
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:tc:postgresql:16-alpine:///test_db
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  flyway:
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.ia.aggregator: DEBUG
    org.hibernate.SQL: DEBUG

---
# =============================================================================
# Production Profile
# =============================================================================
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: WARN
    com.ia.aggregator: INFO
    org.springframework.security: WARN
