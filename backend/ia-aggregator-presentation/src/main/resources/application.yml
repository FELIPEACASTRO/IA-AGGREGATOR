      novita:
        api-key: ${NOVITA_API_KEY:}
        base-url: ${NOVITA_BASE_URL:https://api.novita.ai/v3/openai}
        timeout-ms: ${NOVITA_TIMEOUT_MS:15000}
        retry-attempts: ${NOVITA_RETRY_ATTEMPTS:2}
