        retry-attempts: ${XAI_RETRY_ATTEMPTS:2}
        retry-backoff-ms: ${XAI_RETRY_BACKOFF_MS:250}
        supported-models: ${XAI_SUPPORTED_MODELS:grok-2-latest,grok-3-latest}
      azure-openai:
        api-key: ${AZURE_OPENAI_API_KEY:}
        base-url: ${AZURE_OPENAI_BASE_URL:}
        api-version: ${AZURE_OPENAI_API_VERSION:2024-06-01}
        timeout-ms: ${AZURE_OPENAI_TIMEOUT_MS:15000}
        retry-attempts: ${AZURE_OPENAI_RETRY_ATTEMPTS:2}
        retry-backoff-ms: ${AZURE_OPENAI_RETRY_BACKOFF_MS:250}
        supported-deployments: ${AZURE_OPENAI_SUPPORTED_DEPLOYMENTS:}
      nvidia:
        api-key: ${NVIDIA_API_KEY:}
        base-url: ${NVIDIA_BASE_URL:https://integrate.api.nvidia.com/v1}
        timeout-ms: ${NVIDIA_TIMEOUT_MS:15000}
        retry-attempts: ${NVIDIA_RETRY_ATTEMPTS:2}
        retry-backoff-ms: ${NVIDIA_RETRY_BACKOFF_MS:250}
        supported-models: ${NVIDIA_SUPPORTED_MODELS:meta/llama-3.1-8b-instruct,meta/llama-3.1-70b-instruct}
      cerebras:
        api-key: ${CEREBRAS_API_KEY:}
        base-url: ${CEREBRAS_BASE_URL:https://api.cerebras.ai/v1}
        timeout-ms: ${CEREBRAS_TIMEOUT_MS:15000}
        retry-attempts: ${CEREBRAS_RETRY_ATTEMPTS:2}
        retry-backoff-ms: ${CEREBRAS_RETRY_BACKOFF_MS:250}
        supported-models: ${CEREBRAS_SUPPORTED_MODELS:llama3.1-8b,llama3.1-70b}
      sambanova:
        api-key: ${SAMBANOVA_API_KEY:}
        base-url: ${SAMBANOVA_BASE_URL:https://api.sambanova.ai/v1}
        timeout-ms: ${SAMBANOVA_TIMEOUT_MS:15000}
