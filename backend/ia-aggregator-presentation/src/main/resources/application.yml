        supported-models: ${TOGETHER_SUPPORTED_MODELS:meta-llama/Llama-3.1-8B-Instruct-Turbo,meta-llama/Llama-3.1-70B-Instruct-Turbo}
      fireworks:
        api-key: ${FIREWORKS_API_KEY:}
        base-url: ${FIREWORKS_BASE_URL:https://api.fireworks.ai/inference/v1}
        timeout-ms: ${FIREWORKS_TIMEOUT_MS:15000}
