# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# --- Logging ---
logging:
  level:
    root: INFO
    com.ia.aggregator: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# --- SpringDoc OpenAPI ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: IA Aggregator API
    version: 1.0.0
    description: Multi-tenant AI Provider Aggregation Platform

---
# =============================================================================
# Test Profile
# =============================================================================
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:tc:postgresql:16-alpine:///test_db
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  flyway:
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.ia.aggregator: DEBUG
    org.hibernate.SQL: DEBUG

---
# =============================================================================
# Production Profile
# =============================================================================
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: WARN
    com.ia.aggregator: INFO
    org.springframework.security: WARN
